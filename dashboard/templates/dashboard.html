<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YSS 交易监控面板</title>
<!-- Bootstrap 5 (dark theme) -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
<!-- Socket.IO -->
<script src="https://cdn.socket.io/4.5.1/socket.io.min.js"></script>
<style>
:root {
  --bg-primary: #0d1117;
  --bg-card: #161b22;
  --bg-table: #1c2128;
  --border: #30363d;
  --text-primary: #e6edf3;
  --text-secondary: #8b949e;
  --green: #3fb950;
  --red: #f85149;
  --blue: #58a6ff;
  --yellow: #d29922;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  padding: 20px;
}
/* ── 顶部导航 ── */
.header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 0 20px 0; border-bottom: 1px solid var(--border); margin-bottom: 24px;
}
.header h1 {
  font-size: 22px; font-weight: 600; margin: 0;
}
.header h1 i { color: var(--blue); margin-right: 10px; }
.header .status-bar {
  display: flex; align-items: center; gap: 16px; font-size: 13px; color: var(--text-secondary);
}
.status-dot {
  display: inline-block; width: 8px; height: 8px; border-radius: 50%;
  background: var(--green); animation: pulse 1.5s infinite;
}
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.spin { animation: spin 0.6s linear; display: inline-block; }
/* ── 概览卡片 ── */
.summary-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
.summary-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
  padding: 18px 20px;
}
.summary-card .label { font-size: 12px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
.summary-card .value { font-size: 26px; font-weight: 700; margin-top: 6px; }
.summary-card .value.green { color: var(--green); }
.summary-card .value.red { color: var(--red); }
/* ── 表格容器 ── */
.table-container {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden;
}
.table-toolbar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 20px; border-bottom: 1px solid var(--border);
}
.table-toolbar .title { font-size: 15px; font-weight: 600; }
.table-toolbar .badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; }
.table-wrap { overflow-x: auto; }
table {
  width: 100%; border-collapse: collapse; font-size: 13px;
}
thead th {
  background: #1a1f26; color: var(--text-secondary); font-weight: 600;
  padding: 12px 14px; text-align: right; white-space: nowrap;
  border-bottom: 1px solid var(--border); position: sticky; top: 0;
  cursor: pointer; user-select: none;
}
thead th:first-child { text-align: center; }
thead th:hover { color: var(--text-primary); }
thead th i { font-size: 10px; margin-left: 4px; opacity: 0.4; }
tbody tr {
  border-bottom: 1px solid rgba(48,54,61,0.5); transition: background 0.15s;
}
tbody tr:hover { background: rgba(88,166,255,0.05); }
tbody tr.closed { opacity: 0.6; }
tbody td {
  padding: 11px 14px; text-align: right; white-space: nowrap;
  font-family: "SF Mono", "Fira Code", monospace;
}
tbody td:first-child { text-align: center; color: var(--text-secondary); }
tbody td:last-child { text-align: center; }
/* 状态标签 */
.tag-open { color: var(--green); }
.tag-closed { color: var(--text-secondary); }
.tag-long { color: var(--green); }
.tag-short { color: var(--red); }
/* 正负值 */
.num-green { color: var(--green); }
.num-red { color: var(--red); }
.num-zero { color: var(--text-secondary); }
/* 刷新时间戳 */
.footer-bar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 20px; border-top: 1px solid var(--border); font-size: 12px; color: var(--text-secondary);
}
/* 响应式 */
@media (max-width: 768px) {
  .summary-row { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .header { flex-direction: column; align-items: flex-start; gap: 8px; }
  body { padding: 12px; }
  table { font-size: 12px; }
  thead th, tbody td { padding: 8px 8px; }
}
</style>
</head>
<body>

<!-- ═══ 头部 ═══ -->
<div class="header">
  <h1><i class="bi bi-graph-up-arrow"></i>YSS 交易监控面板</h1>
  <div class="status-bar">
    <span><span class="status-dot"></span> 就绪</span>
    <span id="updateTime">—</span>
    <span id="recordCount">0 条</span>
  </div>
</div>

<!-- ═══ 概览卡片 ═══ -->
<div class="summary-row" id="summaryCards">
  <div class="summary-card">
    <div class="label">总盈亏</div>
    <div class="value" id="totalPnl">0.00</div>
  </div>
  <div class="summary-card">
    <div class="label">持仓数量</div>
    <div class="value" id="openCount">0</div>
  </div>
  <div class="summary-card">
    <div class="label">保证金占用</div>
    <div class="value" id="totalMargin">0.00</div>
  </div>
  <div class="summary-card">
    <div class="label">累计交易</div>
    <div class="value" id="totalTrades">0</div>
  </div>
</div>

<!-- ═══ 表格 ═══ -->
<div class="table-container">
  <div class="table-toolbar">
    <span class="title"><i class="bi bi-table me-1"></i>开仓记录</span>
    <div>
      <button class="btn btn-sm btn-outline-secondary" onclick="refreshData()" title="手动刷新数据">
        <i class="bi bi-arrow-repeat"></i> 刷新
      </button>
      <span class="badge bg-secondary ms-2" id="liveBadge">LIVE</span>
    </div>
  </div>
  <div class="table-wrap">
    <table id="tradeTable">
      <thead>
        <tr>
          <th data-sort="id">#</th>
          <th data-sort="open_time">开仓时间</th>
          <th data-sort="symbol">品种</th>
          <th data-sort="direction">方向</th>
          <th data-sort="entry_price">开仓价</th>
          <th data-sort="tp">止盈</th>
          <th data-sort="sl">止损</th>
          <th data-sort="mark_price">标记价</th>
          <th data-sort="margin">保证金</th>
          <th data-sort="unrealized_pnl">浮动盈亏</th>
          <th data-sort="realized_pnl">已实现盈亏</th>
          <th data-sort="funding">资金费用</th>
          <th data-sort="status">状态</th>
        </tr>
      </thead>
      <tbody id="tradeBody">
        <tr><td colspan="13" style="text-align:center;padding:60px 0;color:var(--text-secondary);font-family:sans-serif;">
          <i class="bi bi-arrow-repeat" style="font-size:24px;display:block;margin-bottom:8px;"></i>等待数据加载...
        </td></tr>
      </tbody>
    </table>
  </div>
  <div class="footer-bar">
    <span><i class="bi bi-info-circle me-1"></i>点击 <i class="bi bi-arrow-repeat"></i> 手动刷新数据</span>
    <span><i class="bi bi-database"></i> <span id="rowCount">0</span> 条记录</span>
  </div>
</div>

<script>
// ════════════════════════════════════════════
// 工具函数
// ════════════════════════════════════════════
function numColor(v, decimals=2) {
  if (v === null || v === undefined || isNaN(v)) return '<span class="num-zero">—</span>';
  const cls = v > 0 ? 'num-green' : v < 0 ? 'num-red' : 'num-zero';
  const sign = v > 0 ? '+' : '';
  return `<span class="${cls}">${sign}${Number(v).toFixed(decimals)}</span>`;
}

function fmt(v, decimals=8) {
  if (v === null || v === undefined || isNaN(v)) return '—';
  return Number(v).toFixed(decimals);
}

function statusBadge(s) {
  if (s === 'OPEN') return '<span class="tag-open"><i class="bi bi-circle-fill" style="font-size:7px;margin-right:4px;"></i>持仓中</span>';
  return '<span class="tag-closed">已平仓</span>';
}

function dirBadge(d) {
  if (d === 'LONG') return '<span class="tag-long"><i class="bi bi-arrow-up-short"></i>多</span>';
  if (d === 'SHORT') return '<span class="tag-short"><i class="bi bi-arrow-down-short"></i>空</span>';
  return d || '—';
}

// ════════════════════════════════════════════
// 渲染
// ════════════════════════════════════════════
let sortKey = 'id';
let sortAsc = false;
let allTrades = [];

function render(data) {
  allTrades = data.trades || [];
  applySort();
  updateSummary(data.summary);
  updateMeta(data.timestamp);
}

function applySort() {
  const sorted = [...allTrades].sort((a, b) => {
    let va = a[sortKey], vb = b[sortKey];
    if (typeof va === 'string') va = va.toLowerCase();
    if (typeof vb === 'string') vb = vb.toLowerCase();
    if (va === null || va === undefined) va = '';
    if (vb === null || vb === undefined) vb = '';
    const cmp = va < vb ? -1 : va > vb ? 1 : 0;
    return sortAsc ? cmp : -cmp;
  });
  renderTable(sorted);
}

function renderTable(rows) {
  const tbody = document.getElementById('tradeBody');
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="13" style="text-align:center;padding:40px 0;color:var(--text-secondary);font-family:sans-serif;"><i class="bi bi-inbox" style="font-size:24px;display:block;margin-bottom:8px;"></i>暂无交易记录</td></tr>';
    document.getElementById('rowCount').textContent = '0';
    return;
  }
  let html = '';
  for (const r of rows) {
    const cls = r.status === 'CLOSED' ? 'closed' : '';
    html += `<tr class="${cls}">
      <td>${r.id || '—'}</td>
      <td>${r.open_time || '—'}</td>
      <td>${r.symbol || '—'}</td>
      <td>${dirBadge(r.direction)}</td>
      <td>${fmt(r.entry_price)}</td>
      <td>${fmt(r.tp)}</td>
      <td>${fmt(r.sl)}</td>
      <td>${fmt(r.mark_price)}</td>
      <td>${fmt(r.margin, 2)}</td>
      <td>${numColor(r.unrealized_pnl)}</td>
      <td>${numColor(r.realized_pnl)}</td>
      <td>${numColor(r.funding_fee, 4)}</td>
      <td>${statusBadge(r.status)}</td>
    </tr>`;
  }
  tbody.innerHTML = html;
  document.getElementById('rowCount').textContent = rows.length;
}

function updateSummary(s) {
  if (!s) return;
  const el = document.getElementById('totalPnl');
  const v = s.total_pnl || 0;
  el.textContent = (v > 0 ? '+' : '') + Number(v).toFixed(2);
  el.className = 'value' + (v > 0 ? ' green' : v < 0 ? ' red' : '');
  document.getElementById('openCount').textContent = s.open_count || 0;
  document.getElementById('totalMargin').textContent = Number(s.total_margin || 0).toFixed(2);
  document.getElementById('totalTrades').textContent = s.total_trades || 0;
}

function updateMeta(ts) {
  document.getElementById('updateTime').textContent = '更新: ' + (ts || '—');
  document.getElementById('recordCount').textContent = (allTrades.length || 0) + ' 条';
}

// ════════════════════════════════════════════
// 表格排序
// ════════════════════════════════════════════
document.querySelectorAll('thead th[data-sort]').forEach(th => {
  th.addEventListener('click', () => {
    const key = th.dataset.sort;
    if (key === sortKey) sortAsc = !sortAsc;
    else { sortKey = key; sortAsc = false; }
    // 移除所有排序图标
    document.querySelectorAll('thead th i.bi').forEach(i => i.remove());
    // 添加当前排序图标
    const icon = document.createElement('i');
    icon.className = sortAsc ? 'bi bi-caret-up-fill' : 'bi bi-caret-down-fill';
    th.appendChild(icon);
    applySort();
  });
});

// ════════════════════════════════════════════
// SocketIO 实时连接
// ════════════════════════════════════════════
const socket = io();
socket.on('connect', () => {
  document.querySelector('.status-dot').style.background = 'var(--green)';
});
socket.on('disconnect', () => {
  document.querySelector('.status-dot').style.background = 'var(--red)';
});
// 手动刷新数据
function refreshData() {
  const btn = document.querySelector('.btn-outline-secondary i');
  if (btn) btn.className = 'bi bi-arrow-repeat spin';
  fetch('/api/data').then(r => r.json()).then(data => {
    if (data && data.trades) render(data);
  }).catch(() => {}).finally(() => {
    if (btn) setTimeout(() => btn.className = 'bi bi-arrow-repeat', 600);
  });
}

// 初次加载
refreshData();
</script>
</body>
</html>
