<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YSS 交易监控面板</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
<script src="https://cdn.socket.io/4.5.1/socket.io.min.js">
function updateSignals(){fetch('/api/signals').then(function(r){return r.json();}).then(function(d){if(!d||!d.signals)return;var tb=document.getElementById('signalBody');var h='';for(var i=0;i<d.signals.length&&i<100;i++){var s=d.signals[i];var dc=s.direction==='LONG'?'<span style="color:var(--green)">多</span>':'<span style="color:var(--red)">空</span>';var ts=s.trade_status==='已开单'?'<span class="status-opened">已开单</span>':s.trade_status==='跳过'?'<span class="status-skipped">跳过</span>':s.trade_status==='失败'?'<span class="status-failed">失败</span>':'<span class="status-pending">待定</span>';var sc=s.score>80?'<span style="color:var(--green)">'+s.score+'</span>':'<span>'+s.score+'</span>';h+='<tr><td>'+s.time+'</td><td>'+s.symbol+'</td><td>'+dc+'</td><td>'+(s.price||'-')+'</td><td>'+sc+'</td><td>'+ts+'</td><td>'+(s.alert_count||1)+'次</td></tr>';}tb.innerHTML=h||'<tr><td colspan="7" style="text-align:center;padding:20px 0;color:var(--text-secondary);font-size:11px;">暂无信号</td></tr>';document.getElementById('signalCount').textContent=d.count+'条';}).catch(function(){});}
</script>
<style>
:root{--bg-primary:#0d1117;--bg-card:#161b22;--bg-table:#1c2128;--border:#30363d;--text-primary:#e6edf3;--text-secondary:#8b949e;--green:#3fb950;--red:#f85149;--blue:#58a6ff;--yellow:#d29922}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;background:var(--bg-primary);color:var(--text-primary);padding:20px;height:100vh;overflow:hidden}
.header{display:flex;justify-content:space-between;align-items:center;padding:12px 0 16px 0;border-bottom:1px solid var(--border)}
.header h1{font-size:20px;font-weight:600;margin:0}.header h1 i{color:var(--blue);margin-right:8px}
.header .status-bar{display:flex;align-items:center;gap:16px;font-size:13px;color:var(--text-secondary)}
.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.spin{animation:spin 0.6s linear;display:inline-block}
.summary-row{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin:16px 0}
.summary-card{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:12px 14px}
.summary-card .label{font-size:11px;color:var(--text-secondary)}.summary-card .value{font-size:20px;font-weight:700;margin-top:4px}
.summary-card .value.green{color:var(--green)}.summary-card .value.red{color:var(--red)}
.main-grid{display:flex;gap:16px;height:calc(100vh - 180px)}
.table-section{flex:1;min-width:0;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;display:flex;flex-direction:column;overflow:hidden}
.log-section{width:45%;min-width:380px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;display:flex;flex-direction:column;overflow:hidden}
.section-header{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.section-header .title{font-size:13px;font-weight:600}
.table-wrap{overflow:auto;flex:1}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:#1a1f26;color:var(--text-secondary);font-weight:600;padding:8px 10px;text-align:right;white-space:nowrap;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:1;cursor:pointer;user-select:none}
thead th:first-child{text-align:center}thead th:hover{color:var(--text-primary)}
tbody tr{border-bottom:1px solid rgba(48,54,61,0.3)}tbody tr:hover{background:rgba(88,166,255,0.05)}
tbody tr.closed{opacity:0.5}
tbody td{padding:7px 10px;text-align:right;white-space:nowrap;font-family:"SF Mono","Fira Code",monospace;font-size:11px}
tbody td:first-child{text-align:center;color:var(--text-secondary)}tbody td:last-child{text-align:center}
.log-container{flex:1;overflow-y:auto;padding:6px 0;font-family:"SF Mono","Fira Code",monospace;font-size:11px}
.log-entry{display:flex;gap:6px;padding:2px 14px;line-height:1.6}.log-entry:hover{background:rgba(255,255,255,0.03)}
.log-time{color:var(--text-secondary);white-space:nowrap;flex-shrink:0}
.status-opened{color:var(--green);font-weight:600}.status-skipped{color:var(--yellow);font-weight:600}.status-failed{color:var(--red);font-weight:600}.status-pending{color:var(--text-secondary)}.log-level-INFO{color:var(--blue)}.log-level-WARN{color:var(--yellow)}.log-level-ERROR{color:var(--red)}
.log-level-SUCCESS{color:var(--green)}.log-level-INIT{color:var(--text-secondary)}
.log-level-SIGNAL{color:var(--green)}.log-level-ENTRY{color:var(--green)}.log-level-EXIT{color:var(--red)}.log-level-REJECT{color:var(--red)}.log-level-信号{color:var(--green)}.log-level-开仓{color:var(--green)}.log-level-未开{color:var(--red)}.log-level-WIN{color:var(--green)}.log-level-分析{color:var(--blue)}
.log-msg{color:var(--text-primary);white-space:nowrap}.log-count{color:var(--text-secondary);font-size:11px}
.tag-open{color:var(--green)}.tag-closed{color:var(--text-secondary)}.tag-long{color:var(--green)}.tag-short{color:var(--red)}
.num-green{color:var(--green)}.num-red{color:var(--red)}.num-zero{color:var(--text-secondary)}
</style>
</head>
<body>

<div class="header">
  <h1><i class="bi bi-graph-up-arrow"></i>YSS 交易监控面板</h1>
  <div class="status-bar">
    <span id="wsStatus"><span class="status-dot"></span> 就绪</span>
    <span id="updateTime">—</span>
    <span id="logCount">0 日志</span>
  </div>
</div>

<div class="summary-row" id="summaryCards">
  <div class="summary-card"><div class="label">账户权益</div><div class="value" id="accountBalance">$0.00</div></div>
  <div class="summary-card"><div class="label">可用余额</div><div class="value" id="availableBalance">$0.00</div></div>
  <div class="summary-card"><div class="label">浮动盈亏</div><div class="value" id="totalPnl">0.00</div></div>
  <div class="summary-card"><div class="label">持仓数量</div><div class="value" id="openCount">0</div></div>
  <div class="summary-card"><div class="label">保证金占用</div><div class="value" id="totalMargin">0.00</div></div>
  <div class="summary-card"><div class="label">累计交易</div><div class="value" id="totalTrades">0</div></div>
</div>

<div class="main-grid">
  <div class="table-section">
    <div class="section-header">
      <span class="title"><i class="bi bi-table me-1"></i>开仓记录</span>
      <div>
        <button class="btn btn-sm btn-outline-secondary" onclick="refreshData()" style="font-size:12px;padding:2px 10px;">
          <i class="bi bi-arrow-repeat"></i> 刷新
        </button>
        <span class="badge bg-secondary ms-1" id="liveBadge" style="font-size:10px;">LIVE</span>
      </div>
    </div>
    <div class="section-header" style="border-top:1px solid var(--border);">
      <span class="title"><i class="bi bi-graph-up-arrow me-1"></i>信号</span>
      <span class="log-count" id="signalCount">0条</span>
    </div>
    <div class="table-wrap" style="height:35%;">
      <table id="signalTable" style="font-size:11px;">
        <thead><tr>
          <th>时间</th><th>币种</th><th>方向</th><th>价格</th><th>评分</th><th>开单状态</th><th>提醒</th>
        </tr></thead>
        <tbody id="signalBody">
          <tr><td colspan="7" style="text-align:center;padding:10px 0;color:var(--text-secondary);font-size:11px;">暂无信号</td></tr>
        </tbody>
      </table>
    </div>
    <div class="table-wrap">
      <table id="tradeTable">
        <thead><tr>
          <th data-sort="id">#</th>
          <th data-sort="open_time">时间</th>
          <th data-sort="symbol">品种</th>
          <th data-sort="direction">方向</th>
          <th data-sort="entry_price">开仓价</th>
          <th data-sort="tp">止盈</th>
          <th data-sort="sl">止损</th>
          <th data-sort="mark_price">标记价</th>
          <th data-sort="margin">保证金</th>
          <th data-sort="unrealized_pnl">浮动盈亏</th>
          <th data-sort="realized_pnl">已实现</th>
          <th data-sort="status">状态</th>
        </tr></thead>
        <tbody id="tradeBody">
          <tr><td colspan="12" style="text-align:center;padding:40px 0;color:var(--text-secondary);font-family:sans-serif;">
            <i class="bi bi-arrow-repeat" style="font-size:20px;display:block;margin-bottom:6px;"></i>等待数据加载...
          </td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="log-section">
    <div class="section-header">
      <span class="title"><i class="bi bi-terminal me-1"></i>实时日志</span>
      <input type="text" id="logSearch" placeholder="搜索..." oninput="filterLogs()" style="background:var(--bg-table);border:1px solid var(--border);border-radius:4px;color:var(--text-primary);padding:2px 6px;font-size:11px;width:120px;margin-left:auto;">
      <span class="log-count" id="logCount2" style="font-size:11px;color:var(--text-secondary);margin-left:8px;">0条</span>
      <button class="btn btn-sm btn-outline-secondary" onclick="clearLogs()" style="font-size:12px;padding:2px 10px;margin-left:8px;">
        <i class="bi bi-trash"></i>
      </button>
    </div>
    <div class="log-container" id="logContainer"></div>
  </div>

<script>
var socket = io();
var allTrades = [], sortKey = "id", sortAsc = false;
var allLogs = [], logFilter = "";

function nc(v,d){if(d===undefined)d=2;if(v===null||v===undefined||isNaN(v))return'<span class="num-zero">—</span>';var c=v>0?'num-green':'num-red';return'<span class="'+c+'">'+(v>0?'+':'')+Number(v).toFixed(d)+'</span>';}
function nz(v,d){if(d===undefined)d=8;if(v===null||v===undefined||isNaN(v))return'—';return Number(v).toFixed(d);}
function sb(s){if(s==='OPEN')return'<span class="tag-open"><i class="bi bi-circle-fill" style="font-size:7px;margin-right:4px;"></i>持仓中</span>';return'<span class="tag-closed">已平仓</span>';}
function db(d){if(d==='LONG')return'<span class="tag-long"><i class="bi bi-arrow-up-short"></i>多</span>';if(d==='SHORT')return'<span class="tag-short"><i class="bi bi-arrow-down-short"></i>空</span>';return d||'—';}

function render(data){allTrades=data.trades||[];applySort();updateSummary(data.summary);updateAccount(data.account);document.getElementById('updateTime').textContent='更新: '+(data.timestamp||'—');}
function applySort(){var r=[...allTrades].sort(function(a,b){var va=a[sortKey],vb=b[sortKey];if(typeof va==='string')va=va.toLowerCase();if(typeof vb==='string')vb=vb.toLowerCase();if(va===null||va===undefined)va='';if(vb===null||vb===undefined)vb='';return(sortAsc?1:-1)*(va<vb?-1:va>vb?1:0);});renderTable(r);}
function renderTable(rows){var tb=document.getElementById('tradeBody');if(!rows.length){tb.innerHTML='<tr><td colspan="12" style="text-align:center;padding:30px 0;color:var(--text-secondary);font-family:sans-serif;"><i class="bi bi-inbox" style="font-size:20px;display:block;margin-bottom:6px;"></i>暂无交易记录</td></tr>';return;}var h='';for(var i=0;i<rows.length;i++){var r=rows[i];var cls=r.status==='CLOSED'?'closed':'';h+='<tr class="'+cls+'"><td>'+(r.id||'—')+'</td><td>'+(r.open_time||'—')+'</td><td>'+(r.symbol||'—')+'</td><td>'+db(r.direction)+'</td><td>'+nz(r.entry_price)+'</td><td>'+nz(r.tp)+'</td><td>'+nz(r.sl)+'</td><td>'+nz(r.mark_price)+'</td><td>'+nz(r.margin,2)+'</td><td>'+nc(r.unrealized_pnl)+'</td><td>'+nc(r.realized_pnl)+'</td><td>'+sb(r.status)+'</td></tr>';}tb.innerHTML=h;}
function updateSummary(s){if(!s)return;document.getElementById('openCount').textContent=s.open_count||0;document.getElementById('totalMargin').textContent=Number(s.total_margin||0).toFixed(2);document.getElementById('totalTrades').textContent=s.total_trades||0;var el=document.getElementById('totalPnl');var v=s.total_pnl||0;el.textContent=(v>0?'+':'')+Number(v).toFixed(2);el.className='value'+(v>0?' green':v<0?' red':'');}
function updateAccount(acct){if(!acct)return;document.getElementById('accountBalance').textContent='$'+(acct.total_balance||0).toFixed(2);document.getElementById('availableBalance').textContent='$'+(acct.available_balance||0).toFixed(2);}

document.querySelectorAll('thead th[data-sort]').forEach(function(th){th.addEventListener('click',function(){var key=th.dataset.sort;if(key===sortKey)sortAsc=!sortAsc;else{sortKey=key;sortAsc=false;}document.querySelectorAll('thead th i.bi').forEach(function(i){i.remove();});var icon=document.createElement('i');icon.className=sortAsc?'bi bi-caret-up-fill':'bi bi-caret-down-fill';th.appendChild(icon);applySort();});});

function addLogEntry(entry){allLogs.push(entry);if(allLogs.length>500)allLogs.shift();renderLogs();document.getElementById('logCount').textContent=allLogs.length+'日志';document.getElementById('logCount2').textContent=allLogs.length+'条';}
function renderLogs(){var c=document.getElementById('logContainer');var items=logFilter?allLogs.filter(function(e){return e.message.toLowerCase().includes(logFilter);}):allLogs;var h='';for(var i=0;i<items.length;i++){var e=items[i];h+='<div class="log-entry"><span class="log-time">'+e.time+'</span><span class="log-level-'+e.level+'">['+e.level+']</span><span class="log-msg">'+e.message+'</span></div>';}c.innerHTML=h;c.scrollTop=c.scrollHeight;}
function filterLogs(){logFilter=document.getElementById('logSearch').value.toLowerCase();renderLogs();}
function clearLogs(){allLogs=[];document.getElementById('logContainer').innerHTML='';document.getElementById('logCount').textContent='0日志';document.getElementById('logCount2').textContent='0条';}

socket.on('connect',function(){document.getElementById('wsStatus').innerHTML='<span class="status-dot"></span>就绪';socket.emit('request_logs');});
socket.on('disconnect',function(){document.getElementById('wsStatus').innerHTML='<span class="status-dot" style="background:var(--red);"></span>断开';});
socket.on('log',function(entry){addLogEntry(entry);});

function refreshData(){var btn=document.querySelector('.btn-outline-secondary i');if(btn)btn.className='bi bi-arrow-repeat spin';fetch('/api/data').then(function(r){return r.json();}).then(function(data){if(data&&data.trades)render(data);}).catch(function(){}).finally(function(){if(btn)setTimeout(function(){btn.className='bi bi-arrow-repeat';},600);});fetch('/api/account').then(function(r){return r.json();}).then(function(acct){if(acct&&acct.total_balance!==undefined)updateAccount(acct);}).catch(function(){});updateSignals();}
setInterval(function(){refreshData();},5000);refreshData();

function updateSignals(){fetch('/api/signals').then(function(r){return r.json();}).then(function(d){if(!d||!d.signals)return;var tb=document.getElementById('signalBody');var h='';for(var i=0;i<d.signals.length&&i<100;i++){var s=d.signals[i];var dc=s.direction==='LONG'?'<span style="color:var(--green)">多</span>':'<span style="color:var(--red)">空</span>';var ts=s.trade_status==='已开单'?'<span class="status-opened">已开单</span>':s.trade_status==='跳过'?'<span class="status-skipped">跳过</span>':s.trade_status==='失败'?'<span class="status-failed">失败</span>':'<span class="status-pending">待定</span>';var sc=s.score>80?'<span style="color:var(--green)">'+s.score+'</span>':'<span>'+s.score+'</span>';h+='<tr><td>'+s.time+'</td><td>'+s.symbol+'</td><td>'+dc+'</td><td>'+(s.price||'-')+'</td><td>'+sc+'</td><td>'+ts+'</td><td>'+(s.alert_count||1)+'次</td></tr>';}tb.innerHTML=h||'<tr><td colspan="7" style="text-align:center;padding:20px 0;color:var(--text-secondary);font-size:11px;">暂无信号</td></tr>';document.getElementById('signalCount').textContent=d.count+'条';}).catch(function(){});}
</script>
</body>
</html>
